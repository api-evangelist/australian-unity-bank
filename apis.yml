apis:
- aid: australian-unity-bank:australian-unity-bank-cdr-product-reference-data-api
  name: Australian Unity Bank CDR Product Reference Data API
  tags:
  - Open Banking
  - CDR
  - Product Reference Data
  - Banking
  - Products
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://consumerdatastandardsaustralia.github.io/standards/#banking-products
  baseURL: https://{dataHolderPublicBaseUri}/cds-au/v1/banking/products
  properties:
  - url: https://consumerdatastandardsaustralia.github.io/standards/#banking-products
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#get-products
    type: APIReference
  - url: https://www.cdr.gov.au/for-providers/how-find-data-holders-product-data-request-service
    type: Provenance
  description: The Consumer Data Right Product Reference Data (PRD) API is the public,
    unauthenticated GET /cds-au/v1/banking/products (and /products/{productId}) surface
    that every active Australian ADI must expose under the DSB Consumer Data Standards
    (CDS). It returns product data - accounts, rates, fees, and eligibility - as JSON
    with an x-v version header. This entry is UNVERIFIED for Australian Unity Bank -
    the bank is not currently listed as an active data holder brand in the CDR Register
    and no live PRD endpoint returned HTTP 200, so the baseURL shown is the shared
    CDS path template ({dataHolderPublicBaseUri}), not a confirmed Australian Unity
    host. The linked contract is the shared DSB Consumer Data Standards, not a
    bank-proprietary API.
