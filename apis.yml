apis:
- aid: australian-unity-bank:australian-unity-bank-cdr-product-reference-data-api
  name: Australian Unity Bank CDR Product Reference Data API
  tags:
  - Open Banking
  - CDR
  - Product Reference Data
  - Banking
  - Products
  - Public
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://consumerdatastandardsaustralia.github.io/standards/#banking-products
  baseURL: https://open-banking.australianunity.com.au/cds-au/v1/banking/products
  properties:
  - url: https://consumerdatastandardsaustralia.github.io/standards/#banking-products
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#cdr-banking-api_get-products
    type: APIReference
  - url: openapi/australian-unity-bank-cds-banking-openapi.json
    type: OpenAPI
  - url: https://www.cdr.gov.au/for-providers/how-find-data-holders-product-data-request-service
    type: Provenance
  description: >-
    Public, unauthenticated Product Reference Data (PRD) endpoints under the
    Consumer Data Right: GET /cds-au/v1/banking/products and GET
    /cds-au/v1/banking/products/{productId}, which every active Australian ADI
    must expose under the DSB Consumer Data Standards. They return machine-readable
    product, rate, fee, and eligibility data as JSON with the mandatory CDS `x-v`
    version header. Australian Unity Bank serves these from its real CDR gateway
    https://open-banking.australianunity.com.au (CloudFront-fronted). Probed
    2026-07-21 from a non-AU IP: GET /cds-au/v1/banking/products returned HTTP 403
    Forbidden across x-v 1-4 (typical WAF/geo/accreditation gating on CDR PRD
    hosts), so product JSON could not be captured verbatim, but the host resolves
    and responds, confirming a live data-holder surface. The contract is the
    shared DSB Consumer Data Standards Banking OpenAPI (v1.36.0, OpenAPI 3.0.3)
    harvested verbatim from the Data Standards Body, not a bank-proprietary spec.
- aid: australian-unity-bank:australian-unity-bank-cdr-accounts-balances-api
  name: Australian Unity Bank CDR Accounts & Balances API
  tags:
  - CDR
  - Open Banking
  - Accounts
  - Balances
  - Banking
  - Consumer Authorized
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://consumerdatastandardsaustralia.github.io/standards/#banking-accounts
  baseURL: https://open-banking.australianunity.com.au/cds-au/v1/banking/accounts
  properties:
  - url: https://consumerdatastandardsaustralia.github.io/standards/#banking-accounts
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#cdr-banking-api_get-accounts
    type: APIReference
  - url: openapi/australian-unity-bank-cds-banking-openapi.json
    type: OpenAPI
  description: >-
    Consumer-authorized account and balance endpoints under the Consumer Data
    Right, served from Australian Unity Bank's CDR host
    https://open-banking.australianunity.com.au/cds-au/v1. Covers GET
    /banking/accounts (list of authorized accounts), GET
    /banking/accounts/balances (bulk balances), GET
    /banking/accounts/{accountId}/balance (single balance), and GET
    /banking/accounts/{accountId} (account detail). Access requires an ACCC-
    accredited data recipient (ADR), an eligible member's consent, and the CDR
    security profile (OIDC/FAPI, mTLS); the host rejects unauthenticated requests
    (probed 2026-07-21: HTTP 403). The contract is the shared DSB Consumer Data
    Standards Banking OpenAPI (v1.36.0), not a bank-proprietary specification.
