name: Australian Unity Bank
kind: company
description: Australian Unity Bank Limited is the banking arm of Australian Unity,
  a member-owned Australian mutual founded in Melbourne in 1840 with origins in the
  friendly-societies movement and a group spanning health insurance, wealth management,
  aged and home care, retirement living, and banking. The bank traces to Big Sky Credit
  Union, which merged with Australian Unity in 2012, became Big Sky Building Society
  Limited, and was later renamed Australian Unity Bank Limited; it offers everyday
  transaction and savings accounts, term deposits, and home loans to members as an
  APRA-authorised deposit-taking institution (ADI) covered by the Financial Claims
  Scheme. On its Consumer Data Right (CDR / Open Banking) posture, Australian Unity
  Bank is a genuine ADI and operates a real CDR Open Banking gateway at
  open-banking.australianunity.com.au (CloudFront-fronted), which as a mandated data
  holder exposes the full DSB Consumer Data Standards (CDS) Banking API surface under
  the /cds-au/v1/banking prefix - the public Product Reference Data (PRD) endpoints
  plus the consumer-authorized Accounts, Balances, Transactions, Direct Debits,
  Scheduled Payments, and Payees endpoints. A July 2026 probe from a non-AU IP
  returned HTTP 403 across x-v 1-4 (typical WAF / geo / accreditation gating on CDR
  hosts), so payloads could not be captured verbatim, but the host resolves and
  responds - confirming Australian Unity as a live data-holder surface. The bank
  publishes no separate first-party developer portal or open-banking API
  documentation beyond CDR (its api.australianunity.com.au host serves only a
  webMethods Integration Server admin page, not documented APIs); the API contract
  is the shared DSB Consumer Data Standards.
