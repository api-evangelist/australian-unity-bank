apis:
- aid: australian-unity-bank:australian-unity-bank-cdr-product-reference-data-api
  name: Australian Unity Bank CDR Product Reference Data API
  tags:
  - Open Banking
  - CDR
  - Product Reference Data
  - Banking
  - Products
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://consumerdatastandardsaustralia.github.io/standards/#banking-products
  baseURL: https://open-banking.australianunity.com.au/cds-au/v1/banking/products
  properties:
  - url: https://consumerdatastandardsaustralia.github.io/standards/#banking-products
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#get-products
    type: APIReference
  - url: https://www.cdr.gov.au/for-providers/how-find-data-holders-product-data-request-service
    type: Provenance
  description: The Consumer Data Right Product Reference Data (PRD) API is the public,
    unauthenticated GET /cds-au/v1/banking/products (and /products/{productId}) surface
    that every active Australian ADI must expose under the DSB Consumer Data Standards
    (CDS). It returns product data - accounts, rates, fees, and eligibility - as JSON
    with an x-v version header. Australian Unity Bank operates a real CDR Open Banking
    gateway at https://open-banking.australianunity.com.au/ (CloudFront-fronted); the
    baseURL above is its confirmed PRD path. As of a July 2026 probe from a non-AU IP,
    the /cds-au/v1/banking/products endpoint (and the host root) returned HTTP 403
    Forbidden to unauthenticated GETs across x-v 1-4 - typical WAF/geo/accreditation
    gating on CDR PRD hosts - so product JSON could not be captured verbatim, but the
    host resolves and responds, confirming Australian Unity as a live data-holder
    surface. The linked contract is the shared DSB Consumer Data Standards, not a
    bank-proprietary API.
