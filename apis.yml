name: Australian Unity Bank
kind: company
description: Australian Unity Bank Limited is the banking arm of Australian Unity,
  a member-owned Australian mutual founded in Melbourne in 1840 with origins in the
  friendly-societies movement and a group spanning health insurance, wealth management,
  aged and home care, retirement living, and banking. The bank traces to Big Sky Credit
  Union, which merged with Australian Unity in 2012, became Big Sky Building Society
  Limited, and was later renamed Australian Unity Bank Limited; it offers everyday
  transaction and savings accounts, term deposits, and home loans to members as an
  APRA-authorised deposit-taking institution (ADI) covered by the Financial Claims
  Scheme. On its Consumer Data Right (CDR / Open Banking) posture, Australian Unity
  Bank is a genuine ADI and operates a real CDR Open Banking gateway at
  open-banking.australianunity.com.au (CloudFront-fronted), exposing the mandated
  Product Reference Data (PRD) surface at /cds-au/v1/banking/products. A July 2026
  probe from a non-AU IP returned HTTP 403 across x-v 1-4 (typical WAF / geo /
  accreditation gating on CDR PRD hosts), so product JSON could not be captured
  verbatim, but the host resolves and responds - confirming Australian Unity as a
  live data-holder surface rather than the earlier unverified template. The bank
  publishes no separate developer portal or open-banking API documentation on its
  public marketing website; the contract is the shared DSB Consumer Data Standards.
